<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowchart Maker</title>
    <link rel="stylesheet" href="style.css?v=25">
</head>
<body>
    <div id="toolbar">
        <div class="tool-group">
            <button class="tool-btn active" data-tool="select" title="Select (V)">
                <svg viewBox="0 0 24 24" width="18" height="18"><path d="M4 2l12 16-4.5-1.5L8 22V10L4 2z" fill="currentColor"/></svg>
            </button>
        </div>
        <div class="separator"></div>
        <div class="tool-group">
            <span class="group-label">Shapes</span>
            <button class="tool-btn" data-tool="square" title="Square (R)">
                <svg viewBox="0 0 24 24" width="18" height="18"><rect x="3" y="3" width="18" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="2"/></svg>
            </button>
            <button class="tool-btn" data-tool="circle" title="Circle (C)">
                <svg viewBox="0 0 24 24" width="18" height="18"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/></svg>
            </button>
            <button class="tool-btn" data-tool="triangle" title="Triangle (T)">
                <svg viewBox="0 0 24 24" width="18" height="18"><polygon points="12,3 22,21 2,21" fill="none" stroke="currentColor" stroke-width="2"/></svg>
            </button>
            <button class="tool-btn" data-tool="group" title="Group (G)">
                <svg viewBox="0 0 24 24" width="18" height="18"><rect x="2" y="2" width="20" height="20" rx="3" fill="none" stroke="currentColor" stroke-width="2" stroke-dasharray="4 2"/></svg>
            </button>
        </div>
        <div class="separator"></div>
        <div class="tool-group">
            <span class="group-label">Arrows</span>
            <button class="tool-btn" data-tool="arrow-oneway" title="One-way Arrow (A)">
                <svg viewBox="0 0 24 24" width="18" height="18"><line x1="4" y1="12" x2="18" y2="12" stroke="currentColor" stroke-width="2"/><polyline points="14,7 20,12 14,17" fill="none" stroke="currentColor" stroke-width="2"/></svg>
            </button>
            <button class="tool-btn" data-tool="arrow-twoway" title="Two-way Arrow (D)">
                <svg viewBox="0 0 24 24" width="18" height="18"><line x1="6" y1="12" x2="18" y2="12" stroke="currentColor" stroke-width="2"/><polyline points="14,7 20,12 14,17" fill="none" stroke="currentColor" stroke-width="2"/><polyline points="10,7 4,12 10,17" fill="none" stroke="currentColor" stroke-width="2"/></svg>
            </button>
        </div>
        <div class="separator"></div>
        <div class="tool-group">
            <span class="group-label">Color</span>
            <button class="tool-btn" data-tool="paint" title="Paint (P)">
                <svg viewBox="0 0 24 24" width="18" height="18"><path d="M20.7 4.3a1 1 0 00-1.4 0L12 11.6 10.4 10a1 1 0 00-1.4 0l-5 5A2 2 0 005.4 18H9a2 2 0 001.4-.6L17 10.8l3.7-3.7-.3-.3z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M5 21c1.5 0 3-1.5 3-3s-1.5-2-3-2-3 1-3 3 1.5 2 3 2z" fill="currentColor"/></svg>
            </button>
            <div id="color-palette"></div>
        </div>
        <div class="separator"></div>
        <div class="tool-group">
            <button class="tool-btn" id="btn-delete" title="Delete (Del)">
                <svg viewBox="0 0 24 24" width="18" height="18"><polyline points="3,6 5,6 21,6" fill="none" stroke="currentColor" stroke-width="2"/><path d="M19 6L18 20a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6" fill="none" stroke="currentColor" stroke-width="2"/><line x1="10" y1="11" x2="10" y2="17" stroke="currentColor" stroke-width="2"/><line x1="14" y1="11" x2="14" y2="17" stroke="currentColor" stroke-width="2"/></svg>
            </button>
            <button class="tool-btn" id="btn-undo" title="Undo (Ctrl+Z)">
                <svg viewBox="0 0 24 24" width="18" height="18"><polyline points="1,4 1,10 7,10" fill="none" stroke="currentColor" stroke-width="2"/><path d="M3.51 15a9 9 0 105.64-8.36L1 10" fill="none" stroke="currentColor" stroke-width="2"/></svg>
            </button>
            <button class="tool-btn" id="btn-redo" title="Redo (Ctrl+Y)">
                <svg viewBox="0 0 24 24" width="18" height="18"><polyline points="23,4 23,10 17,10" fill="none" stroke="currentColor" stroke-width="2"/><path d="M20.49 15a9 9 0 11-5.64-8.36L23 10" fill="none" stroke="currentColor" stroke-width="2"/></svg>
            </button>
            <button class="tool-btn" id="btn-fit" title="Zoom to Fit (F)">
                <svg viewBox="0 0 24 24" width="18" height="18"><polyline points="4,8 4,4 8,4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><polyline points="20,8 20,4 16,4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><polyline points="4,16 4,20 8,20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><polyline points="20,16 20,20 16,20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
        </div>
        <div class="spacer"></div>
        <div class="tool-group">
            <button class="tool-btn" id="btn-save" title="Save (Ctrl+S)">
                <svg viewBox="0 0 24 24" width="18" height="18"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z" fill="none" stroke="currentColor" stroke-width="2"/><polyline points="17,21 17,13 7,13 7,21" fill="none" stroke="currentColor" stroke-width="2"/><polyline points="7,3 7,8 15,8" fill="none" stroke="currentColor" stroke-width="2"/></svg>
            </button>
            <button class="tool-btn" id="btn-load" title="Load">
                <svg viewBox="0 0 24 24" width="18" height="18"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z" fill="none" stroke="currentColor" stroke-width="2"/></svg>
            </button>
            <button class="tool-btn" id="btn-export" title="Export for Claude">
                <svg viewBox="0 0 24 24" width="18" height="18"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" fill="none" stroke="currentColor" stroke-width="2"/><polyline points="7,10 12,15 17,10" fill="none" stroke="currentColor" stroke-width="2"/><line x1="12" y1="15" x2="12" y2="3" stroke="currentColor" stroke-width="2"/></svg>
            </button>
            <button class="tool-btn" id="btn-png" title="Export as PNG">
                <svg viewBox="0 0 24 24" width="18" height="18"><rect x="3" y="3" width="18" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><path d="M21 15l-5-5L5 21" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
            </button>
        </div>
    </div>
    <div id="status-bar">
        <span id="status-text">Select a tool to begin</span>
        <span id="zoom-level">100%</span>
    </div>
    <div id="canvas-container">
        <svg id="canvas" xmlns="http://www.w3.org/2000/svg">
            <g id="world">
                <g id="groups-layer"></g>
                <g id="arrows-layer"></g>
                <g id="nodes-layer"></g>
                <g id="labels-layer"></g>
            </g>
        </svg>
    </div>
    <div id="arrow-tooltip" class="hidden"></div>
    <div id="text-editor" class="hidden">
        <input type="text" id="text-input" spellcheck="false">
    </div>
    <div id="arrow-editor" class="hidden">
        <label for="arrow-label-input">Label</label>
        <input type="text" id="arrow-label-input" spellcheck="false" placeholder="Short header...">
        <label for="arrow-detail-input">Detail</label>
        <textarea id="arrow-detail-input" spellcheck="false" placeholder="Detailed explanation..." rows="3"></textarea>
        <div class="arrow-editor-buttons">
            <button id="arrow-editor-ok">OK</button>
            <button id="arrow-editor-cancel">Cancel</button>
        </div>
    </div>
    <div id="png-preview" style="display:none">
        <div id="png-preview-inner">
            <img id="png-preview-img">
            <div id="png-preview-name-row">
                <label for="png-name-input">Name</label>
                <input type="text" id="png-name-input" spellcheck="false" placeholder="flowchart">
            </div>
            <div id="png-preview-buttons">
                <button id="png-preview-save">Save PNG</button>
                <button id="png-preview-cancel">Cancel</button>
            </div>
        </div>
    </div>
    <input type="file" id="file-input" accept=".json" style="display:none">
    <script src="app.js?v=18"></script>
</body>
</html>
